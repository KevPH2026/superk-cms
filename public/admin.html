<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superk CMS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }

  .nav { background: #111; border-bottom: 1px solid #222; padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
  .nav h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .nav .badge { background: #222; color: #888; font-size: 11px; padding: 3px 8px; border-radius: 4px; }

  .toolbar { padding: 16px 24px; border-bottom: 1px solid #1a1a1a; display: flex; gap: 12px; align-items: center; }
  .toolbar input { background: #111; border: 1px solid #333; color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 14px; }
  .toolbar input:focus { outline: none; border-color: #555; }
  .toolbar select { background: #111; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #fff; color: #000; }
  .btn-primary:hover { background: #e5e5e5; }
  .btn-secondary { background: #222; color: #ccc; }
  .btn-secondary:hover { background: #2a2a2a; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { background: transparent; color: #888; }
  .btn-ghost:hover { background: #1a1a1a; color: #ccc; }

  .posts { padding: 16px 24px; }
  .post-item { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 16px; transition: border-color 0.15s; }
  .post-item:hover { border-color: #333; }
  .post-item .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .status-draft { background: #444; }
  .status-published { background: #22c55e; }
  .post-info { flex: 1; min-width: 0; }
  .post-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-meta { font-size: 12px; color: #666; display: flex; gap: 12px; flex-wrap: wrap; }
  .post-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: #111; border: 1px solid #222; border-radius: 12px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; color: #fff; }
  .modal-body { padding: 24px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 14px; font-family: inherit; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #555; }
  .form-row textarea { resize: vertical; min-height: 120px; }
  .form-row.hint { font-size: 11px; color: #555; margin-top: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lang-label { font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; justify-content: flex-end; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 14px; color: #ccc; }
  .toggle { width: 44px; height: 24px; background: #333; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle.on { background: #22c55e; }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
  .toggle.on::after { left: 23px; }

  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 32px; width: 100%; max-width: 360px; }
  .login-box h2 { font-size: 20px; color: #fff; margin-bottom: 20px; text-align: center; }
  .login-box input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
  .login-box input:focus { outline: none; border-color: #555; }
  .login-box .btn { width: 100%; text-align: center; }

  .empty { text-align: center; padding: 60px 20px; color: #555; }
  .empty p { margin-bottom: 16px; }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>Superk CMS</h2>
    <input type="text" id="username" placeholder="Username" value="admin">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Sign In</button>
    <p style="margin-top:12px;font-size:12px;color:#444;text-align:center">Default: admin / superk2026</p>
  </div>
</div>

<!-- Main -->
<div id="mainScreen" style="display:none">
  <div class="nav">
    <h1>Superk CMS</h1>
    <span class="badge">v1.0</span>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search posts..." oninput="loadPosts()">
    <select id="filterStatus" onchange="loadPosts()">
      <option value="">All Status</option>
      <option value="published">Published</option>
      <option value="draft">Draft</option>
    </select>
    <button class="btn btn-primary" onclick="openNew()">+ New Post</button>
  </div>

  <div class="posts" id="postsList">
    <div class="empty"><p>Loading...</p></div>
  </div>
</div>

<!-- Editor Modal -->
<div class="modal-overlay" id="editorModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Post</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="lang-label">English</div>
        <input type="text" id="postTitle" placeholder="Post title">
      </div>
      <div class="form-row">
        <div class="lang-label">中文标题</div>
        <input type="text" id="postTitleZh" placeholder="中文标题（可选）">
      </div>
      <div class="form-row">
        <label>Slug (URL)</label>
        <input type="text" id="postSlug" placeholder="auto-generated-from-title">
        <p class="hint">Leave empty to auto-generate from title</p>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Category</label>
          <select id="postCategory">
            <option value="">None</option>
            <option value="ai-tech">AI & Technology</option>
            <option value="business">Business & Growth</option>
            <option value="ecommerce">Cross-border E-commerce</option>
            <option value="growth">Personal Growth</option>
            <option value="thoughts">Thoughts</option>
          </select>
        </div>
        <div class="form-row">
          <label>Tags (comma-separated)</label>
          <input type="text" id="postTags" placeholder="ai, growth, business">
        </div>
      </div>
      <div class="form-row">
        <label>Excerpt / 摘要</label>
        <textarea id="postExcerpt" placeholder="Short summary for article cards..." rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="lang-label">English Content</div>
        <textarea id="postContent" placeholder="Write your article in English..." rows="8"></textarea>
      </div>
      <div class="form-row">
        <div class="lang-label">中文内容</div>
        <textarea id="postContentZh" placeholder="中文内容（可选）..." rows="6"></textarea>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Published</span>
        <div class="toggle" id="publishToggle" onclick="togglePublish()"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePost()">Save</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('cms_token') || '';
let posts = [];
let editingId = null;

async function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  });
  if (res.ok) {
    const data = await res.json();
    token = data.token;
    localStorage.setItem('cms_token', token);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadPosts();
  } else {
    alert('Invalid credentials');
  }
}

async function loadPosts() {
  const search = document.getElementById('searchInput').value;
  const status = document.getElementById('filterStatus').value;
  let url = '/api/posts?';
  if (status) url += 'status=' + status + '&';
  const res = await fetch(url);
  posts = await res.json();

  const filtered = search
    ? posts.filter(p => p.title.toLowerCase().includes(search.toLowerCase()) || (p.title_zh||'').includes(search))
    : posts;

  const list = document.getElementById('postsList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><p>No posts yet. Create your first one!</p></div>';
    return;
  }
  list.innerHTML = filtered.map(p => `
    <div class="post-item">
      <div class="status-dot status-${p.status}"></div>
      <div class="post-info">
        <div class="post-title">${escHtml(p.title)}${p.title_zh ? ' <span style="color:#555">— ' + escHtml(p.title_zh) + '</span>' : ''}</div>
        <div class="post-meta">
          <span>${p.category || 'No category'}</span>
          <span>${p.status}</span>
          <span>${p.published_at ? new Date(p.published_at).toLocaleDateString() : 'Not published'}</span>
          <span>/${p.slug}</span>
        </div>
      </div>
      <div class="post-actions">
        <button class="btn btn-secondary btn-sm" onclick="editPost(${p.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

function openNew() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Post';
  document.getElementById('postTitle').value = '';
  document.getElementById('postTitleZh').value = '';
  document.getElementById('postSlug').value = '';
  document.getElementById('postCategory').value = '';
  document.getElementById('postTags').value = '';
  document.getElementById('postExcerpt').value = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postContentZh').value = '';
  document.getElementById('publishToggle').classList.remove('on');
  document.getElementById('editorModal').classList.add('active');
}

async function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Post';
  document.getElementById('postTitle').value = p.title;
  document.getElementById('postTitleZh').value = p.title_zh || '';
  document.getElementById('postSlug').value = p.slug;
  document.getElementById('postCategory').value = p.category || '';
  document.getElementById('postTags').value = p.tags || '';
  document.getElementById('postExcerpt').value = p.excerpt || '';
  document.getElementById('postContent').value = p.content || '';
  document.getElementById('postContentZh').value = p.content_zh || '';
  document.getElementById('publishToggle').classList.toggle('on', p.status === 'published');
  document.getElementById('editorModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editorModal').classList.remove('active');
}

function togglePublish() {
  document.getElementById('publishToggle').classList.toggle('on');
}

async function savePost() {
  const data = {
    title: document.getElementById('postTitle').value,
    title_zh: document.getElementById('postTitleZh').value,
    slug: document.getElementById('postSlug').value,
    category: document.getElementById('postCategory').value,
    tags: document.getElementById('postTags').value,
    excerpt: document.getElementById('postExcerpt').value,
    content: document.getElementById('postContent').value,
    content_zh: document.getElementById('postContentZh').value,
    status: document.getElementById('publishToggle').classList.contains('on') ? 'published' : 'draft'
  };

  if (!data.title) { alert('Title is required'); return; }

  const url = editingId ? `/api/posts/${editingId}` : '/api/posts';
  const method = editingId ? 'PUT' : 'POST';
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  if (res.ok) {
    closeModal();
    loadPosts();
  } else {
    const err = await res.json();
    alert('Error: ' + err.error);
  }
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  await fetch(`/api/posts/${id}`, { method: 'DELETE' });
  loadPosts();
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-login if token exists
if (token) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  loadPosts();
}
</script>
</body>
</html>
